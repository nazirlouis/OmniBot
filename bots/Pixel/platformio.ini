[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; NimBLE GATT writes + JSON used to overflow default host stack (BTC_TASK / stack canary).
board_build.sdkconfig.defaults =
    CONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=10240

; ============================================================
; CRITICAL MEMORY SETTINGS (DO NOT CHANGE)
; This enables the 8MB of PSRAM needed for Audio + Camera
; ============================================================
board_build.arduino.memory_type = qio_opi
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Face-scan JPEGs (0x06/0x07) use VGA + high quality; must exceed default 15KB WebSocket binary cap.
    -DWEBSOCKETS_MAX_DATA_SIZE=65536

; WebSockets.h unconditionally redefines WEBSOCKETS_MAX_DATA_SIZE unless wrapped; see patch_websockets.py
extra_scripts = pre:patch_websockets.py

lib_deps =
    esp32-camera
    moononournation/GFX Library for Arduino @ 1.4.7
    bblanchon/ArduinoJson @ ^6.21.3
    links2004/WebSockets @ ^2.4.1
    adafruit/RTClib @ ^2.1.3 ; <-- ADD THIS
    bitbank2/JPEGDEC @ ^1.8.4